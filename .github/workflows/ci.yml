name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quiz_pengupil
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mysqli, pdo, pdo_mysql

    - name: Setup MySQL database
      run: |
        mysql -h 127.0.0.1 -P 3306 -u root -proot quiz_pengupil < db/quiz_pengupil.sql

    - name: Set DB Connection for Testing (Stub/Mocking DB Credentials)
      run: |
        # Mengubah koneksi.php agar sesuai dengan credentials Github Actions
        sed -i "s/\$password = '';/\$password = 'root';/g" koneksi.php

    - name: Start PHP Server in Background
      run: |
        php -S localhost:8000 &
        sleep 3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium

    - name: Run Selenium Tests
      run: |
        python tests/test_auth.py
